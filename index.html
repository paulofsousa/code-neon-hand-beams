<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>NEON HAND BEAMS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlay"></canvas>

    <div id="hud">
      <div class="hud-title">// HAND TRACKER v1.0</div>
      <div class="hud-row">
        <span class="hud-label">HANDS DETECTED:</span>
        <span class="hud-value" id="hands-count">0</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">GESTURE:</span>
        <span class="hud-value" id="gesture">None</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">FPS:</span>
        <span class="hud-value" id="fps">0</span>
      </div>
    </div>

    <div id="start-screen">
      <h1>NEON HAND BEAMS</h1>
      <p>Tap to enable camera</p>
      <button id="start-btn">START</button>
      <p class="hint">Front camera, both hands visible for beam effect</p>
    </div>

    <div id="error-screen" hidden>
      <h2>Camera unavailable</h2>
      <p id="error-message"></p>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
